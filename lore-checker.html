<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH Lore Consistency Checker — LorebySpec</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #111122;
            --border: #2a2a4a;
            --accent: #7b5ea7;
            --accent-light: #a07fd4;
            --gold: #c9a84c;
            --text: #ddd8f0;
            --muted: #7a7a9a;
            --danger: #c0392b;
            --warning: #e67e22;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0d0d22 0%, #1a1040 50%, #0d0d22 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        header a:hover { color: var(--text); border-color: var(--accent); }

        main {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-bar label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .api-bar input:focus { outline: none; border-color: var(--accent); }

        .api-bar .api-hint {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 680px) { .panel-grid { grid-template-columns: 1fr; } }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            background: #16162e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon { font-size: 1rem; }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }

        .panel-header .badge {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }

        .panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 200px;
        }

        .panel textarea:focus { outline: none; }

        .panel textarea::placeholder { color: var(--muted); font-style: italic; }

        .theory-panel { grid-column: 1 / -1; }

        .theory-panel textarea { min-height: 140px; }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-light); }
        button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
        }

        .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: transparent; }

        .status {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: monospace;
            margin-left: auto;
        }

        .results {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .results.visible { display: block; }

        .results-header {
            background: #16162e;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-header h2 {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        .results-body { padding: 24px; }

        .result-section {
            margin-bottom: 24px;
        }

        .result-section:last-child { margin-bottom: 0; }

        .result-section h3 {
            font-size: 0.75rem;
            font-family: monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .result-section.contradictions h3 { color: var(--danger); }
        .result-section.weaknesses h3 { color: var(--warning); }
        .result-section.questions h3 { color: var(--accent-light); }
        .result-section.assessment h3 { color: var(--gold); }

        .result-section p, .result-section li {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .result-section ul {
            padding-left: 20px;
        }

        .result-section li { margin-bottom: 8px; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #2a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #e07070;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        .raw-output {
            font-size: 0.88rem;
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text);
        }

        .raw-output strong { color: var(--gold); }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>KH Lore Consistency Checker</h1>
        <div class="subtitle">LorebySpec — theory stress-tester</div>
    </div>
    <a href="index.html">← portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">stored in session only</span>
    </div>

    <div class="panel-grid">
        <div class="panel">
            <div class="panel-header">
                <span class="icon">📖</span>
                <h2>lore context</h2>
                <span class="badge">optional</span>
            </div>
            <textarea id="loreContext" placeholder="Paste established KH facts, game summaries, or canon events here. The checker will use this as its source of truth.

Example: In Kingdom Hearts II, Roxas is Sora's Nobody, created when Sora briefly became a Heartless in Hollow Bastion. Axel (Lea) is Roxas's best friend within Organization XIII..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="icon">🔑</span>
                <h2>known anchors</h2>
                <span class="badge">optional</span>
            </div>
            <textarea id="anchors" placeholder="List any specific canon facts you want to treat as hard rules — things your theory must not contradict.

Example:
- Xehanort is the main antagonist across BbS, DDD, and KH3
- Hearts can persist inside other people (Ventus inside Sora)
- Nobodies do eventually grow new hearts"></textarea>
        </div>

        <div class="panel theory-panel">
            <div class="panel-header">
                <span class="icon">✦</span>
                <h2>your theory</h2>
            </div>
            <textarea id="theory" placeholder="Paste your Kingdom Hearts theory here. Be as detailed as you like — the more context you give, the more precise the analysis."></textarea>
        </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button id="checkBtn" onclick="checkTheory()">Check Theory</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="results" id="results">
        <div class="results-header">
            <h2>analysis</h2>
        </div>
        <div class="results-body" id="resultsBody"></div>
    </div>
</main>

<footer>
    built for LorebySpec content workflow · powered by Claude · no data stored
</footer>

<script>
    async function checkTheory() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const theory = document.getElementById('theory').value.trim();
        const loreContext = document.getElementById('loreContext').value.trim();
        const anchors = document.getElementById('anchors').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        const statusText = document.getElementById('statusText');
        const checkBtn = document.getElementById('checkBtn');
        const results = document.getElementById('results');
        const resultsBody = document.getElementById('resultsBody');

        errorBanner.style.display = 'none';

        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!theory) return showError('Paste a theory to check.');

        checkBtn.disabled = true;
        statusText.innerHTML = '<span class="spinner"></span> analysing...';
        results.classList.remove('visible');

        let userMessage = '';
        if (loreContext) userMessage += `## Lore Context (treat as canon)\n${loreContext}\n\n`;
        if (anchors) userMessage += `## Hard Anchors (must not be contradicted)\n${anchors}\n\n`;
        userMessage += `## Theory to Stress-Test\n${theory}`;

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-calls': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 1500,
                    system: `You are a Kingdom Hearts lore expert and theory stress-tester for a YouTube channel called LorebySpec. Your job is to rigorously but constructively analyse fan theories.

When given a theory (and optionally, lore context and hard anchors), respond with exactly four sections using these markdown headers:

## Contradictions Found
List any direct conflicts between the theory and established canon or the provided context. If none, say "None identified." Be specific — cite which game or event is contradicted.

## Potential Weaknesses
Flag gaps, leaps in logic, or points that aren't contradictions but could be challenged. These are things a skeptical viewer would push back on.

## Clarifying Questions
Ask 2–4 targeted questions that would either strengthen the theory if answered well, or reveal a fatal flaw if not. Make these the questions a sharp editor would ask before filming.

## Overall Assessment
One paragraph. Give a honest verdict: how solid is this theory's foundation? What's its strongest point? What would make it bulletproof?

Be direct. Don't pad. Write as a collaborator, not a judge.`,
                    messages: [{ role: 'user', content: userMessage }]
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `API error ${response.status}`);
            }

            const data = await response.json();
            const text = data.content[0].text;

            resultsBody.innerHTML = renderMarkdown(text);
            results.classList.add('visible');
            statusText.textContent = 'done';

        } catch (err) {
            showError(err.message);
            statusText.textContent = '';
        } finally {
            checkBtn.disabled = false;
        }
    }

    function renderMarkdown(text) {
        const sectionMap = {
            'Contradictions Found': 'contradictions',
            'Potential Weaknesses': 'weaknesses',
            'Clarifying Questions': 'questions',
            'Overall Assessment': 'assessment'
        };

        const sectionTitles = Object.keys(sectionMap);
        const parts = text.split(/^## /m).filter(Boolean);

        if (parts.length < 2) {
            return `<div class="raw-output">${escapeHtml(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
        }

        return parts.map(part => {
            const lines = part.split('\n');
            const title = lines[0].trim();
            const body = lines.slice(1).join('\n').trim();
            const cssClass = sectionMap[title] || '';

            const renderedBody = body
                .split('\n')
                .map(line => {
                    line = line.trim();
                    if (!line) return '';
                    const isBullet = line.startsWith('- ') || line.startsWith('* ') || /^\d+\./.test(line);
                    const content = escapeHtml(isBullet ? line.replace(/^[-*]\s|^\d+\.\s/, '') : line)
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    return isBullet ? `<li>${content}</li>` : `<p>${content}</p>`;
                })
                .join('');

            const hasBullets = renderedBody.includes('<li>');
            const wrapped = hasBullets
                ? renderedBody.replace(/(<li>.*?<\/li>)+/gs, m => `<ul>${m}</ul>`)
                : renderedBody;

            return `<div class="result-section ${cssClass}"><h3>${escapeHtml(title)}</h3>${wrapped}</div>`;
        }).join('');
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function clearAll() {
        document.getElementById('theory').value = '';
        document.getElementById('loreContext').value = '';
        document.getElementById('anchors').value = '';
        document.getElementById('results').classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
    }
</script>

</body>
</html>
