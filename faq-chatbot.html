<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot — Specious Coda Bishop</title>
    <style>
        :root {
            --bg: #080b14;
            --surface: #0e1425;
            --border: #1a2545;
            --accent: #3d7eff;
            --accent-light: #6699ff;
            --warm: #ffc947;
            --text: #ccd9ff;
            --muted: #5a72b0;
            --success: #34d399;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #060910 0%, #0a1230 50%, #060910 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--accent-light);
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        header a:hover { color: var(--text); border-color: var(--accent); }

        main {
            flex: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-bar label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .api-bar input:focus { outline: none; border-color: var(--accent); }

        .api-bar .api-hint {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .panel-header {
            background: #0b1220;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon { font-size: 1rem; }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }

        .panel-header .panel-meta {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--muted);
            font-family: monospace;
        }

        .panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
        }

        .panel textarea:focus { outline: none; }
        .panel textarea::placeholder { color: var(--muted); font-style: italic; }

        .kb-textarea { min-height: 280px; }
        .question-textarea { min-height: 100px; }

        .char-counter { font-size: 0.65rem; color: var(--muted); font-family: monospace; white-space: nowrap; }
        .char-counter.warn { color: var(--warning); }
        .char-counter.over { color: var(--danger); }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 20px 0 32px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-light); }
        button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
        }

        .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: transparent; }

        .status {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: monospace;
            margin-left: auto;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #1a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #f87171;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        .results {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .results.visible { display: block; }

        .results-header {
            background: #0b1220;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .results-header h2 {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--warm);
            letter-spacing: 0.04em;
        }

        .results-header .cost-note {
            font-size: 0.7rem;
            color: var(--muted);
            font-family: monospace;
        }

        .results-body { padding: 28px; }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.75;
            color: var(--text);
        }

        .answer-text p { margin-bottom: 12px; }
        .answer-text p:last-child { margin-bottom: 0; }

        .answer-actions {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 14px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-family: monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: border-color 0.2s, color 0.2s;
        }

        .copy-btn:hover { border-color: var(--success); color: var(--success); background: transparent; }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>FAQ Chatbot</h1>
        <div class="subtitle">paste your knowledge base · ask a customer question · get an answer</div>
    </div>
    <a href="index.html">← portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">session only — not stored</span>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="icon">📄</span>
            <h2>knowledge base</h2>
            <span class="char-counter panel-meta" id="kbCounter">0 chars</span>
        </div>
        <textarea class="kb-textarea" id="knowledgeBase" placeholder="Paste your company's FAQ, help docs, or knowledge base here. Plain text works best — copy from Notion, Confluence, Zendesk, Google Docs, or anywhere.

Example:

## Refunds
We offer full refunds within 30 days of purchase, no questions asked. To request a refund, email billing@company.com with your order number.

## Shipping
Standard shipping takes 3–5 business days. Express (1–2 days) is available at checkout for an additional fee. We ship to all EU countries.

## Account Access
If you've lost access to your account, use the Forgot Password link on the login page. If you no longer have access to your registered email, contact support@company.com with a photo ID."></textarea>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="icon">💬</span>
            <h2>customer question</h2>
            <span class="char-counter panel-meta" id="qCounter">0 chars</span>
        </div>
        <textarea class="question-textarea" id="question" placeholder="Paste the customer's message here. Verbatim, paraphrased, or anything in between.

Example: Hi, I bought something last week and it's not right for me. Can I return it?"></textarea>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button id="askBtn" onclick="ask()">Ask</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="results" id="results">
        <div class="results-header">
            <h2>answer</h2>
            <span class="cost-note" id="costNote"></span>
        </div>
        <div class="results-body">
            <div class="answer-text" id="answerText"></div>
            <div class="answer-actions">
                <button class="copy-btn" id="copyBtn" onclick="copyAnswer()">copy answer</button>
            </div>
        </div>
    </div>
</main>

<footer>
    faq chatbot demo · powered by Claude Haiku · ~$0.001–$0.01 per query · no data stored
</footer>

<script>
    const KB_SOFT = 20000;
    const KB_HARD = 60000;
    const Q_SOFT = 500;
    const Q_HARD = 1000;

    let lastAnswerText = '';

    document.getElementById('knowledgeBase').addEventListener('input', function() {
        const len = this.value.length;
        const counter = document.getElementById('kbCounter');
        counter.textContent = `${len.toLocaleString()} chars`;
        counter.className = 'char-counter panel-meta' + (len > KB_HARD ? ' over' : len > KB_SOFT ? ' warn' : '');
    });

    document.getElementById('question').addEventListener('input', function() {
        const len = this.value.length;
        const counter = document.getElementById('qCounter');
        counter.textContent = `${len.toLocaleString()} chars`;
        counter.className = 'char-counter panel-meta' + (len > Q_HARD ? ' over' : len > Q_SOFT ? ' warn' : '');
    });

    async function ask() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const kb = document.getElementById('knowledgeBase').value.trim();
        const question = document.getElementById('question').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        const statusText = document.getElementById('statusText');
        const askBtn = document.getElementById('askBtn');
        const results = document.getElementById('results');

        errorBanner.style.display = 'none';

        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!kb) return showError('Paste your knowledge base or FAQ content above.');
        if (!question) return showError('Enter a customer question to answer.');

        const processedKb = kb.length > KB_HARD
            ? kb.slice(0, KB_HARD) + '\n\n[Knowledge base truncated at 60,000 characters]'
            : kb;

        const processedQ = question.length > Q_HARD
            ? question.slice(0, Q_HARD) + '\n\n[Message truncated]'
            : question;

        askBtn.disabled = true;
        statusText.innerHTML = '<span class="spinner"></span> looking up answer...';
        results.classList.remove('visible');

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-calls': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 600,
                    system: `You are a customer support assistant. Answer questions using ONLY the knowledge base provided below. Do not use any outside knowledge.

Rules:
- Answer directly and concisely. 2–4 sentences is usually enough.
- Answer naturally — do not say "according to our documentation" or "in the knowledge base". Just answer.
- If the question cannot be answered from the knowledge base, respond with exactly: "I don't have information about that in our documentation. I'd recommend reaching out to our team directly so we can help."
- Never guess, infer, or extrapolate beyond what the knowledge base states.
- Be warm, clear, and professional.

## Knowledge Base

${processedKb}`,
                    messages: [{ role: 'user', content: processedQ }]
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `API error ${response.status}`);
            }

            const data = await response.json();
            const answerRaw = data.content[0].text.trim();
            lastAnswerText = answerRaw;

            const inputTokens = data.usage?.input_tokens || Math.round((processedKb.length + processedQ.length) / 4 + 150);
            const outputTokens = data.usage?.output_tokens || Math.round(answerRaw.length / 4);
            const costUsd = ((inputTokens * 0.80) + (outputTokens * 4.00)) / 1_000_000;
            const costStr = costUsd < 0.001 ? '< $0.001' : `~$${costUsd.toFixed(4)}`;

            document.getElementById('answerText').innerHTML = renderAnswer(answerRaw);
            document.getElementById('costNote').textContent = `${inputTokens.toLocaleString()} in · ${outputTokens} out · ${costStr}`;
            results.classList.add('visible');
            statusText.textContent = 'done';

        } catch (err) {
            showError(err.message);
            statusText.textContent = '';
        } finally {
            askBtn.disabled = false;
        }
    }

    function renderAnswer(text) {
        return text
            .split('\n\n')
            .filter(p => p.trim())
            .map(p => `<p>${escapeHtml(p.trim())}</p>`)
            .join('');
    }

    function copyAnswer() {
        const btn = document.getElementById('copyBtn');
        navigator.clipboard.writeText(lastAnswerText).then(() => {
            btn.textContent = 'copied!';
            setTimeout(() => btn.textContent = 'copy answer', 2000);
        }).catch(() => {
            btn.textContent = 'failed';
            setTimeout(() => btn.textContent = 'copy answer', 2000);
        });
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function clearAll() {
        document.getElementById('knowledgeBase').value = '';
        document.getElementById('question').value = '';
        document.getElementById('kbCounter').textContent = '0 chars';
        document.getElementById('kbCounter').className = 'char-counter panel-meta';
        document.getElementById('qCounter').textContent = '0 chars';
        document.getElementById('qCounter').className = 'char-counter panel-meta';
        document.getElementById('results').classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
        lastAnswerText = '';
    }
</script>

</body>
</html>
