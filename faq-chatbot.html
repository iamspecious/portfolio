<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot — Specious Coda Bishop</title>
    <style>
        :root {
            --bg: #0a0d14;
            --surface: #111622;
            --border: #1e2a3a;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --warm: #f59e0b;
            --text: #dce8f8;
            --muted: #6b8aaa;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #080c14 0%, #0d1828 50%, #080c14 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--accent-light);
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        header a:hover { color: var(--text); border-color: var(--accent); }

        main {
            flex: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-bar label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .api-bar input:focus { outline: none; border-color: var(--accent); }

        .api-bar .api-hint {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .panel-header {
            background: #0d1628;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon { font-size: 1rem; }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }

        .panel-header .badge {
            font-size: 0.65rem;
            color: var(--muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }

        .char-counter {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .char-counter.warn { color: var(--warm); }
        .char-counter.over { color: var(--danger); }

        .panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
        }

        .panel textarea:focus { outline: none; }
        .panel textarea::placeholder { color: var(--muted); font-style: italic; }

        .kb-panel textarea { min-height: 220px; }
        .question-panel textarea { min-height: 90px; }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-light); }
        button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
        }

        .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: transparent; }

        .status {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: monospace;
            margin-left: auto;
        }

        .answer {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .answer.visible { display: block; }

        .answer-header {
            background: #0d1628;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .answer-header h2 {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--warm);
            letter-spacing: 0.04em;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            margin-left: auto;
            transition: border-color 0.2s, color 0.2s;
        }

        .copy-btn:hover { border-color: var(--success); color: var(--success); background: transparent; }

        .answer-body {
            padding: 24px;
            font-size: 0.9rem;
            line-height: 1.75;
            color: var(--text);
        }

        .answer-body p { margin-bottom: 10px; }
        .answer-body p:last-child { margin-bottom: 0; }
        .answer-body ul { padding-left: 20px; margin-bottom: 10px; }
        .answer-body li { margin-bottom: 6px; }
        .answer-body strong { color: var(--accent-light); }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .browser-note {
            background: #0d1222;
            border: 1px solid var(--border);
            border-left: 3px solid var(--muted);
            border-radius: 0 6px 6px 0;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.72rem;
            font-family: monospace;
            color: var(--muted);
            line-height: 1.5;
        }

        .browser-note strong { color: #a0b4cc; }

        .error-banner {
            background: #2a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #e07070;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>FAQ / Knowledge Base Chatbot</h1>
        <div class="subtitle">paste your docs · ask a question · get a grounded answer</div>
    </div>
    <a href="index.html">← portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">session only — not stored</span>
    </div>

    <div class="panel kb-panel">
        <div class="panel-header">
            <span class="icon">📄</span>
            <h2>knowledge base</h2>
            <span class="badge">context</span>
            <span class="char-counter" id="kbCounter">0 / 8,000</span>
        </div>
        <textarea id="kbContent" placeholder="Paste your FAQ, help centre content, internal docs, or policy text here. The chatbot answers only from what you provide — nothing else.

Example:
Q: How do I reset my password?
A: Go to Settings › Security › Reset Password. You'll receive an email within 2 minutes.

Q: What payment methods do you accept?
A: We accept Visa, Mastercard, and PayPal. We do not accept Amex at this time.

Q: How do I cancel my subscription?
A: You can cancel any time from Settings › Billing › Cancel Plan. You'll retain access until the end of your billing period.

Q: Is there a free trial?
A: Yes — all plans include a 14-day free trial. No credit card required to start."></textarea>
    </div>

    <div class="panel question-panel">
        <div class="panel-header">
            <span class="icon">💬</span>
            <h2>customer question</h2>
        </div>
        <textarea id="question" placeholder="What does the customer want to know?

Example: Do you take American Express? I want to upgrade my plan."></textarea>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button id="askBtn" onclick="ask()">Ask</button>
        <button class="btn-secondary" onclick="clearQuestion()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="answer" id="answer">
        <div class="answer-header">
            <h2>answer</h2>
            <button class="copy-btn" id="copyBtn" onclick="copyAnswer()">copy</button>
        </div>
        <div class="answer-body" id="answerBody"></div>
    </div>
</main>

<footer>
    faq chatbot demo · powered by Claude Haiku · ~0.1¢ per query · no data stored
</footer>

<script>
    const KB_SOFT = 8000;
    const KB_HARD = 12000;

    document.getElementById('kbContent').addEventListener('input', function() {
        const len = this.value.length;
        const counter = document.getElementById('kbCounter');
        counter.textContent = `${len.toLocaleString()} / ${KB_SOFT.toLocaleString()}`;
        counter.className = 'char-counter' + (len > KB_HARD ? ' over' : len > KB_SOFT ? ' warn' : '');
    });

    async function ask() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const kbContent = document.getElementById('kbContent').value.trim();
        const question = document.getElementById('question').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        const statusText = document.getElementById('statusText');
        const askBtn = document.getElementById('askBtn');
        const answer = document.getElementById('answer');
        const answerBody = document.getElementById('answerBody');

        errorBanner.style.display = 'none';

        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!apiKey.startsWith('sk-ant-')) return showError('API key format looks wrong — Anthropic keys start with sk-ant-. Check you\'ve pasted the full key.');
        if (!kbContent) return showError('Paste your knowledge base or FAQ content above.');
        if (!question) return showError('Enter a customer question.');

        const processedKb = kbContent.length > KB_HARD
            ? kbContent.slice(0, KB_HARD) + '\n\n[Knowledge base truncated at 12,000 characters]'
            : kbContent;

        askBtn.disabled = true;
        statusText.innerHTML = '<span class="spinner"></span> searching docs...';
        answer.classList.remove('visible');

        try {
            const response = await fetch('https://anthropic-proxy.work-specious.workers.dev', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-calls': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 500,
                    system: `You are a customer support assistant. Answer the customer's question using only the knowledge base content provided below. Do not use outside knowledge or invent any information.

Rules:
- If the answer is clearly in the knowledge base, give it directly and concisely.
- If the knowledge base partially covers the question, share what it says and note what is missing.
- If the question is not covered at all, say: "That's not something covered in our documentation. I'd recommend reaching out to the support team directly."
- Never invent policies, prices, procedures, timelines, or features.
- Keep answers brief and direct — no padding or unnecessary preamble.

Knowledge Base:
---
${processedKb}
---`,
                    messages: [{ role: 'user', content: question }]
                })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const msg = errData.error?.message || '';
                if (response.status === 401) {
                    throw new Error('Authentication failed (401) — your API key is invalid or expired. Check it in your Anthropic console.');
                } else if (response.status === 403) {
                    throw new Error('Access forbidden (403) — your API key may not have permission for this model.');
                } else if (response.status === 429) {
                    throw new Error('Rate limited (429) — you\'ve hit your usage limit. Wait a moment and try again.');
                } else if (response.status === 400) {
                    throw new Error(`Bad request (400) — ${msg || 'check your input and API key'}`);
                } else if (response.status >= 500) {
                    throw new Error(`Anthropic server error (${response.status}) — the service may be temporarily unavailable. Try again in a moment.`);
                } else {
                    throw new Error(msg || `API error ${response.status}`);
                }
            }

            const data = await response.json();
            const text = data.content[0].text.trim();

            answerBody.innerHTML = renderAnswer(text);
            answer.classList.add('visible');
            statusText.textContent = 'done';

        } catch (err) {
            console.error('FAQ chatbot error:', err);
            if (err instanceof TypeError) {
                showError(
                    'Network error — the request failed before reaching the API. ' +
                    'Possible causes: a browser extension blocking api.anthropic.com, a firewall or VPN, or a CORS restriction. ' +
                    'Open your browser console (F12 → Console tab) to see the specific error.'
                );
            } else {
                showError(err.message);
            }
            statusText.textContent = '';
        } finally {
            askBtn.disabled = false;
        }
    }

    function renderAnswer(text) {
        const rendered = text.split('\n').map(line => {
            line = line.trim();
            if (!line) return '';
            const isBullet = line.startsWith('- ') || line.startsWith('* ') || /^\d+\./.test(line);
            const content = escapeHtml(isBullet ? line.replace(/^[-*]\s|^\d+\.\s/, '') : line)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return isBullet ? `<li>${content}</li>` : `<p>${content}</p>`;
        }).join('');

        const hasBullets = rendered.includes('<li>');
        return hasBullets ? rendered.replace(/(<li>.*?<\/li>)+/gs, m => `<ul>${m}</ul>`) : rendered;
    }

    function copyAnswer() {
        const text = document.getElementById('answerBody').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'copied!';
            setTimeout(() => btn.textContent = 'copy', 2000);
        }).catch(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'failed';
            setTimeout(() => btn.textContent = 'copy', 2000);
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function clearQuestion() {
        document.getElementById('question').value = '';
        document.getElementById('answer').classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
    }
</script>

</body>
</html>
