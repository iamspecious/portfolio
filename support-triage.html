<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket Triage — Specious Coda Bishop</title>
    <style>
        :root {
            --bg: #0a0f0e;
            --surface: #111a19;
            --border: #1e3330;
            --accent: #2a9d8f;
            --accent-light: #4abdb0;
            --warm: #e9c46a;
            --text: #d8eeec;
            --muted: #6a9a97;
            --danger: #e63946;
            --warning: #f4a261;
            --success: #2dc653;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #080f0e 0%, #0d2320 50%, #080f0e 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--accent-light);
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        header a:hover { color: var(--text); border-color: var(--accent); }

        main {
            flex: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-bar label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .api-bar input:focus { outline: none; border-color: var(--accent); }

        .api-bar .api-hint {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .panel-header {
            background: #0d1f1d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon { font-size: 1rem; }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }

        .panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 220px;
        }

        .panel textarea:focus { outline: none; }
        .panel textarea::placeholder { color: var(--muted); font-style: italic; }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-light); }
        button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
        }

        .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: transparent; }

        .status {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: monospace;
            margin-left: auto;
        }

        .results {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .results.visible { display: block; }

        .results-header {
            background: #0d1f1d;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .results-header h2 {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--warm);
            letter-spacing: 0.04em;
        }

        .results-body { padding: 24px; }

        .result-section { margin-bottom: 24px; }
        .result-section:last-child { margin-bottom: 0; }

        .result-section h3 {
            font-size: 0.75rem;
            font-family: monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-section.category h3 { color: var(--accent-light); }
        .result-section.urgency h3 { color: var(--warm); }
        .result-section.response h3 { color: var(--success); }

        .result-section p, .result-section li {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .result-section ul { padding-left: 20px; }
        .result-section li { margin-bottom: 8px; }

        .urgency-badge {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .level-low { background: #0d2e1a; color: #2dc653; }
        .level-medium { background: #2e240d; color: #e9c46a; }
        .level-high { background: #2e1a0d; color: #f4a261; }
        .level-critical { background: #2e0d0d; color: #e63946; }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            margin-left: auto;
            transition: border-color 0.2s, color 0.2s;
        }

        .copy-btn:hover { border-color: var(--success); color: var(--success); background: transparent; }

        .model-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .model-bar > label:first-child {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .model-option {
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 5px;
            border: 1px solid var(--border);
            transition: border-color 0.2s, background 0.2s;
        }

        .model-option:has(input:checked) { border-color: var(--accent); background: #0d1f1d; }
        .model-option input { accent-color: var(--accent); cursor: pointer; }
        .model-option .model-name { font-size: 0.8rem; font-family: monospace; color: var(--text); }
        .model-option .model-price { font-size: 0.68rem; color: var(--muted); margin-left: 4px; }
        .model-option:has(input:checked) .model-price { color: var(--accent-light); }
        .model-rec { font-size: 0.65rem; background: #0d2e1a; color: #2dc653; padding: 1px 6px; border-radius: 3px; font-family: monospace; }
        .model-auto { font-size: 0.65rem; background: #2e240d; color: var(--warning); padding: 1px 6px; border-radius: 3px; font-family: monospace; display: none; margin-left: auto; }

        .char-counter {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .char-counter.warn { color: var(--warning); }
        .char-counter.over { color: var(--danger); }

        .browser-note {
            background: #1a1e2e;
            border: 1px solid var(--border);
            border-left: 3px solid var(--muted);
            border-radius: 0 6px 6px 0;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 0.72rem;
            font-family: monospace;
            color: var(--muted);
            line-height: 1.5;
        }

        .browser-note strong { color: #a0b4cc; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #2a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #e07070;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        .raw-output {
            font-size: 0.88rem;
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Support Ticket Triage</h1>
        <div class="subtitle">paste a message · get category, urgency, and a suggested response</div>
    </div>
    <a href="index.html">← portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">session only — not stored</span>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="icon">📩</span>
            <h2>customer message</h2>
            <span class="char-counter" id="charCounter">0 / 3,000</span>
        </div>
        <textarea id="message" placeholder="Paste anything — a customer message, an error log, a stack trace, or a support thread transcript. Real, anonymised, or fabricated.

Example: Hi, I've been charged twice this month and my account still shows as inactive. I've emailed three times with no response. This is really frustrating — I need this sorted today as I have a client presentation tomorrow that depends on this software.

Logs work too: TypeError: Cannot read properties of undefined (reading 'user') at checkout.js:142..."></textarea>
    </div>

    <div class="model-bar">
        <label>MODEL</label>
        <label class="model-option">
            <input type="radio" name="model" value="claude-haiku-4-5-20251001" checked>
            <span class="model-name">Haiku 4.5</span>
            <span class="model-price" id="priceHaiku">~0.20¢</span>
            <span class="model-rec">recommended</span>
        </label>
        <label class="model-option">
            <input type="radio" name="model" value="claude-sonnet-4-6">
            <span class="model-name">Sonnet 4.6</span>
            <span class="model-price" id="priceSonnet">~0.60¢</span>
        </label>
        <span class="model-auto" id="modelAuto">auto-switched — input over 5k</span>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button id="triageBtn" onclick="triage()">Triage</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="results" id="results">
        <div class="results-header">
            <h2>triage output</h2>
        </div>
        <div class="results-body" id="resultsBody"></div>
    </div>
</main>

<footer>
    support triage demo · powered by Claude · no data stored
</footer>

<script>
    const SOFT_LIMIT  = 3000;
    const HAIKU_HARD  = 5000;
    const SONNET_HARD = 10000;
    const TRUNCATION_NOTE = '\n\n[Input truncated to fit token limit]';

    const MODEL_PRICING = {
        'claude-haiku-4-5-20251001': { input: 0.80, output: 4.00 },
        'claude-sonnet-4-6':         { input: 3.00, output: 15.00 }
    };

    let autoSwitched = false;

    function selectedModel() {
        return document.querySelector('input[name="model"]:checked').value;
    }

    function estimateCost(modelId, messageLength) {
        const inputTokens = 250 + Math.ceil(messageLength / 4);
        const outputTokens = 300;
        const m = MODEL_PRICING[modelId];
        const cents = ((inputTokens * m.input + outputTokens * m.output) / 1_000_000) * 100;
        return `~${cents.toFixed(2)}¢`;
    }

    function updatePrices() {
        const len = document.getElementById('message').value.length;
        document.getElementById('priceHaiku').textContent  = estimateCost('claude-haiku-4-5-20251001', len);
        document.getElementById('priceSonnet').textContent = estimateCost('claude-sonnet-4-6', len);
    }

    document.querySelectorAll('input[name="model"]').forEach(radio => {
        radio.addEventListener('change', function() {
            autoSwitched = false;
            document.getElementById('modelAuto').style.display = 'none';
        });
    });

    document.getElementById('message').addEventListener('input', function() {
        const len = this.value.length;
        const haiku  = document.querySelector('input[value="claude-haiku-4-5-20251001"]');
        const sonnet = document.querySelector('input[value="claude-sonnet-4-6"]');
        const autoNote = document.getElementById('modelAuto');

        if (len > HAIKU_HARD && haiku.checked) {
            sonnet.checked = true;
            autoSwitched = true;
            autoNote.style.display = 'inline';
        } else if (len <= HAIKU_HARD && autoSwitched) {
            haiku.checked = true;
            autoSwitched = false;
            autoNote.style.display = 'none';
        }

        const hardLimit = sonnet.checked ? SONNET_HARD : HAIKU_HARD;
        const counter = document.getElementById('charCounter');
        counter.textContent = `${len.toLocaleString()} / ${SOFT_LIMIT.toLocaleString()}`;
        counter.className = 'char-counter' + (len > hardLimit ? ' over' : len > SOFT_LIMIT ? ' warn' : '');

        updatePrices();
    });

    async function triage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const message = document.getElementById('message').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        const statusText = document.getElementById('statusText');
        const triageBtn = document.getElementById('triageBtn');
        const results = document.getElementById('results');
        const resultsBody = document.getElementById('resultsBody');

        errorBanner.style.display = 'none';

        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!apiKey.startsWith('sk-ant-')) return showError('API key format looks wrong — Anthropic keys start with sk-ant-. Check you\'ve pasted the full key.');
        if (!message) return showError('Paste a customer message to triage.');

        const model = selectedModel();
        const hardLimit = model === 'claude-sonnet-4-6' ? SONNET_HARD : HAIKU_HARD;
        const processedMessage = message.length > hardLimit
            ? message.slice(0, hardLimit - TRUNCATION_NOTE.length) + TRUNCATION_NOTE
            : message;

        triageBtn.disabled = true;
        statusText.innerHTML = '<span class="spinner"></span> triaging...';
        results.classList.remove('visible');

        try {
            const response = await fetch('https://anthropic-proxy.work-specious.workers.dev', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-calls': 'true'
                },
                body: JSON.stringify({
                    model: model,
                    max_tokens: 1000,
                    system: `You are a support triage specialist. When given a customer message — which may be a written message, an error log, a stack trace, or a support thread excerpt — respond with exactly three sections using these markdown headers:

## Category
State the category on the first line (choose the most fitting: Billing, Technical Issue, Account Access, Bug Report, Feature Request, General Inquiry, Complaint, Cancellation, or Other). Then add 1–2 sentences explaining why this category fits.

## Urgency
State the urgency level on the first line — exactly one of: Low, Medium, High, or Critical. Then add 1–2 sentences of reasoning. Consider: tone and emotional state of the customer, implied business impact, time sensitivity, how long the issue has been ongoing, and for logs or error traces, the severity and type of error.

## Suggested Response
Write a first response the support agent can send as-is or adapt. It should be warm, professional, and specific to what the customer described. If the input is a log or error snippet with no accompanying message, write a response acknowledging the technical issue and requesting any relevant context (steps to reproduce, environment, account details). Do not use placeholder text like [NAME] or [PRODUCT] — write it ready to send. Keep it under 150 words.

Be direct. No preamble or commentary outside these three sections.`,
                    messages: [{ role: 'user', content: processedMessage }]
                })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const msg = errData.error?.message || '';
                if (response.status === 401) {
                    throw new Error('Authentication failed (401) — your API key is invalid or expired. Check it in your Anthropic console.');
                } else if (response.status === 403) {
                    throw new Error('Access forbidden (403) — your API key may not have permission for this model.');
                } else if (response.status === 429) {
                    throw new Error('Rate limited (429) — you\'ve hit your usage limit. Wait a moment and try again.');
                } else if (response.status === 400) {
                    throw new Error(`Bad request (400) — ${msg || 'check your input and API key'}`);
                } else if (response.status >= 500) {
                    throw new Error(`Anthropic server error (${response.status}) — the service may be temporarily unavailable. Try again in a moment.`);
                } else {
                    throw new Error(msg || `API error ${response.status}`);
                }
            }

            const data = await response.json();
            const text = data.content[0].text;

            resultsBody.innerHTML = renderOutput(text);
            results.classList.add('visible');
            statusText.textContent = 'done';

        } catch (err) {
            console.error('Triage error:', err);
            if (err instanceof TypeError) {
                showError(
                    'Network error — the request failed before reaching the API. ' +
                    'Possible causes: a browser extension blocking api.anthropic.com, a firewall or VPN, or a CORS restriction. ' +
                    'Open your browser console (F12 → Console tab) to see the specific error.'
                );
            } else {
                showError(err.message);
            }
            statusText.textContent = '';
        } finally {
            triageBtn.disabled = false;
        }
    }

    function renderOutput(text) {
        const sectionMap = {
            'Category': 'category',
            'Urgency': 'urgency',
            'Suggested Response': 'response'
        };

        const urgencyLevels = ['critical', 'high', 'medium', 'low'];
        const parts = text.split(/^## /m).filter(Boolean);

        if (parts.length < 2) {
            return `<div class="raw-output">${escapeHtml(text)}</div>`;
        }

        return parts.map(part => {
            const lines = part.split('\n');
            const title = lines[0].trim();
            let body = lines.slice(1).join('\n').trim();
            const cssClass = sectionMap[title] || '';

            let headerExtra = '';
            let dataAttr = '';

            if (cssClass === 'urgency') {
                const firstLine = body.split('\n')[0].trim().toLowerCase();
                const level = urgencyLevels.find(l => firstLine === l || firstLine.startsWith(l + ' '));
                if (level) {
                    headerExtra = `<span class="urgency-badge level-${level}">${level.charAt(0).toUpperCase() + level.slice(1)}</span>`;
                    const bodyLines = body.split('\n');
                    if (bodyLines[0].trim().toLowerCase() === level) {
                        body = bodyLines.slice(1).join('\n').trim();
                    }
                }
            }

            if (cssClass === 'response') {
                dataAttr = ` data-text="${escapeAttr(body)}"`;
                headerExtra = `<button class="copy-btn" onclick="copyResponse(this.closest('.result-section'))">copy</button>`;
            }

            const renderedBody = renderBody(body);

            return `<div class="result-section ${cssClass}"${dataAttr}><h3>${escapeHtml(title)}${headerExtra ? ' ' + headerExtra : ''}</h3>${renderedBody}</div>`;
        }).join('');
    }

    function renderBody(body) {
        const rendered = body.split('\n').map(line => {
            line = line.trim();
            if (!line) return '';
            const isBullet = line.startsWith('- ') || line.startsWith('* ') || /^\d+\./.test(line);
            const content = escapeHtml(isBullet ? line.replace(/^[-*]\s|^\d+\.\s/, '') : line)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return isBullet ? `<li>${content}</li>` : `<p>${content}</p>`;
        }).join('');

        const hasBullets = rendered.includes('<li>');
        return hasBullets ? rendered.replace(/(<li>.*?<\/li>)+/gs, m => `<ul>${m}</ul>`) : rendered;
    }

    function copyResponse(el) {
        const text = el.dataset.text;
        navigator.clipboard.writeText(text).then(() => {
            const btn = el.querySelector('.copy-btn');
            btn.textContent = 'copied!';
            setTimeout(() => btn.textContent = 'copy', 2000);
        }).catch(() => {
            const btn = el.querySelector('.copy-btn');
            btn.textContent = 'failed';
            setTimeout(() => btn.textContent = 'copy', 2000);
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function clearAll() {
        document.getElementById('message').value = '';
        document.getElementById('results').classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
    }
</script>

</body>
</html>
