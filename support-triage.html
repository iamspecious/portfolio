<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket Triage — Specious Coda Bishop</title>
    <style>
        :root {
            --bg: #0a0f0e;
            --surface: #111a19;
            --border: #1e3330;
            --accent: #2a9d8f;
            --accent-light: #4abdb0;
            --warm: #e9c46a;
            --text: #d8eeec;
            --muted: #6a9a97;
            --danger: #e63946;
            --warning: #f4a261;
            --success: #2dc653;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #080f0e 0%, #0d2320 50%, #080f0e 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--accent-light);
            letter-spacing: 0.05em;
        }

        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
            font-family: monospace;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        header a:hover { color: var(--text); border-color: var(--accent); }

        main {
            flex: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-bar label {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
            white-space: nowrap;
        }

        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .api-bar input:focus { outline: none; border-color: var(--accent); }

        .api-bar .api-hint {
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .panel-header {
            background: #0d1f1d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header .icon { font-size: 1rem; }

        .panel-header h2 {
            font-size: 0.85rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }

        .panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px;
            font-family: 'Georgia', serif;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 220px;
        }

        .panel textarea:focus { outline: none; }
        .panel textarea::placeholder { color: var(--muted); font-style: italic; }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button:hover { background: var(--accent-light); }
        button:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
        }

        .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: transparent; }

        .status {
            font-size: 0.78rem;
            color: var(--muted);
            font-family: monospace;
            margin-left: auto;
        }

        .results {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .results.visible { display: block; }

        .results-header {
            background: #0d1f1d;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .results-header h2 {
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--warm);
            letter-spacing: 0.04em;
        }

        .results-body { padding: 24px; }

        .result-section { margin-bottom: 24px; }
        .result-section:last-child { margin-bottom: 0; }

        .result-section h3 {
            font-size: 0.75rem;
            font-family: monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-section.category h3 { color: var(--accent-light); }
        .result-section.urgency h3 { color: var(--warm); }
        .result-section.response h3 { color: var(--success); }

        .result-section p, .result-section li {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .result-section ul { padding-left: 20px; }
        .result-section li { margin-bottom: 8px; }

        .urgency-badge {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .level-low { background: #0d2e1a; color: #2dc653; }
        .level-medium { background: #2e240d; color: #e9c46a; }
        .level-high { background: #2e1a0d; color: #f4a261; }
        .level-critical { background: #2e0d0d; color: #e63946; }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            margin-left: auto;
            transition: border-color 0.2s, color 0.2s;
        }

        .copy-btn:hover { border-color: var(--success); color: var(--success); background: transparent; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-banner {
            background: #2a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #e07070;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        .raw-output {
            font-size: 0.88rem;
            line-height: 1.7;
            white-space: pre-wrap;
            color: var(--text);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Support Ticket Triage</h1>
        <div class="subtitle">paste a message · get category, urgency, and a suggested response</div>
    </div>
    <a href="index.html">← portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">session only — not stored</span>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="icon">📩</span>
            <h2>customer message</h2>
        </div>
        <textarea id="message" placeholder="Paste the customer message here. Real, anonymised, or fabricated — whatever you want to triage.

Example: Hi, I've been charged twice this month and my account still shows as inactive. I've emailed three times with no response. This is really frustrating — I need this sorted today as I have a client presentation tomorrow that depends on this software."></textarea>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button id="triageBtn" onclick="triage()">Triage</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="results" id="results">
        <div class="results-header">
            <h2>triage output</h2>
        </div>
        <div class="results-body" id="resultsBody"></div>
    </div>
</main>

<footer>
    support triage demo · powered by Claude · no data stored
</footer>

<script>
    async function triage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const message = document.getElementById('message').value.trim();
        const errorBanner = document.getElementById('errorBanner');
        const statusText = document.getElementById('statusText');
        const triageBtn = document.getElementById('triageBtn');
        const results = document.getElementById('results');
        const resultsBody = document.getElementById('resultsBody');

        errorBanner.style.display = 'none';

        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!message) return showError('Paste a customer message to triage.');

        triageBtn.disabled = true;
        statusText.innerHTML = '<span class="spinner"></span> triaging...';
        results.classList.remove('visible');

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-calls': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-6',
                    max_tokens: 1000,
                    system: `You are a support triage specialist. When given a customer message, respond with exactly three sections using these markdown headers:

## Category
State the category on the first line (choose the most fitting: Billing, Technical Issue, Account Access, Bug Report, Feature Request, General Inquiry, Complaint, Cancellation, or Other). Then add 1–2 sentences explaining why this category fits.

## Urgency
State the urgency level on the first line — exactly one of: Low, Medium, High, or Critical. Then add 1–2 sentences of reasoning. Consider: tone and emotional state of the customer, implied business impact, time sensitivity, and how long the issue has been ongoing.

## Suggested Response
Write a first response the support agent can send as-is or adapt. It should be warm, professional, and specific to what the customer described. Do not use placeholder text like [NAME] or [PRODUCT] — write it ready to send. Keep it under 150 words.

Be direct. No preamble or commentary outside these three sections.`,
                    messages: [{ role: 'user', content: message }]
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `API error ${response.status}`);
            }

            const data = await response.json();
            const text = data.content[0].text;

            resultsBody.innerHTML = renderOutput(text);
            results.classList.add('visible');
            statusText.textContent = 'done';

        } catch (err) {
            showError(err.message);
            statusText.textContent = '';
        } finally {
            triageBtn.disabled = false;
        }
    }

    function renderOutput(text) {
        const sectionMap = {
            'Category': 'category',
            'Urgency': 'urgency',
            'Suggested Response': 'response'
        };

        const urgencyLevels = ['critical', 'high', 'medium', 'low'];
        const parts = text.split(/^## /m).filter(Boolean);

        if (parts.length < 2) {
            return `<div class="raw-output">${escapeHtml(text)}</div>`;
        }

        return parts.map(part => {
            const lines = part.split('\n');
            const title = lines[0].trim();
            let body = lines.slice(1).join('\n').trim();
            const cssClass = sectionMap[title] || '';

            let headerExtra = '';
            let dataAttr = '';

            if (cssClass === 'urgency') {
                const firstLine = body.split('\n')[0].trim().toLowerCase();
                const level = urgencyLevels.find(l => firstLine === l || firstLine.startsWith(l + ' '));
                if (level) {
                    headerExtra = `<span class="urgency-badge level-${level}">${level.charAt(0).toUpperCase() + level.slice(1)}</span>`;
                    const bodyLines = body.split('\n');
                    if (bodyLines[0].trim().toLowerCase() === level) {
                        body = bodyLines.slice(1).join('\n').trim();
                    }
                }
            }

            if (cssClass === 'response') {
                dataAttr = ` data-text="${escapeAttr(body)}"`;
                headerExtra = `<button class="copy-btn" onclick="copyResponse(this.closest('.result-section'))">copy</button>`;
            }

            const renderedBody = renderBody(body);

            return `<div class="result-section ${cssClass}"${dataAttr}><h3>${escapeHtml(title)}${headerExtra ? ' ' + headerExtra : ''}</h3>${renderedBody}</div>`;
        }).join('');
    }

    function renderBody(body) {
        const rendered = body.split('\n').map(line => {
            line = line.trim();
            if (!line) return '';
            const isBullet = line.startsWith('- ') || line.startsWith('* ') || /^\d+\./.test(line);
            const content = escapeHtml(isBullet ? line.replace(/^[-*]\s|^\d+\.\s/, '') : line)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return isBullet ? `<li>${content}</li>` : `<p>${content}</p>`;
        }).join('');

        const hasBullets = rendered.includes('<li>');
        return hasBullets ? rendered.replace(/(<li>.*?<\/li>)+/gs, m => `<ul>${m}</ul>`) : rendered;
    }

    function copyResponse(el) {
        const text = el.dataset.text;
        navigator.clipboard.writeText(text).then(() => {
            const btn = el.querySelector('.copy-btn');
            btn.textContent = 'copied!';
            setTimeout(() => btn.textContent = 'copy', 2000);
        }).catch(() => {
            const btn = el.querySelector('.copy-btn');
            btn.textContent = 'failed';
            setTimeout(() => btn.textContent = 'copy', 2000);
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function clearAll() {
        document.getElementById('message').value = '';
        document.getElementById('results').classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
    }
</script>

</body>
</html>
