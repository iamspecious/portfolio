<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Tool — LoreBySpec</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #111122;
            --border: #2a2a4a;
            --accent: #7b5ea7;
            --accent-light: #a07fd4;
            --gold: #c9a84c;
            --text: #ddd8f0;
            --muted: #7a7a9a;
            --danger: #c0392b;
            --warning: #b07d20;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0d0d22 0%, #1a1040 50%, #0d0d22 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 1.4rem; color: var(--gold); letter-spacing: 0.05em; }
        header .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 4px; font-family: monospace; }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }
        header a:hover { color: var(--text); border-color: var(--accent); }

        main { flex: 1; max-width: 760px; margin: 0 auto; padding: 40px 24px; width: 100%; }

        /* API bar */
        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .api-bar label { font-size: 0.75rem; color: var(--muted); font-family: monospace; white-space: nowrap; }
        .api-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .api-bar input:focus { outline: none; border-color: var(--accent); }
        .api-bar .api-hint { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }

        /* Mode toggle */
        .mode-toggle {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
            gap: 4px;
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s, color 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: white; }
        .mode-btn:hover:not(.active) { color: var(--text); background: #1a1a30; }

        /* Input panel */
        .input-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .input-panel-header {
            background: #16162e;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-panel-header .icon { font-size: 0.9rem; }
        .input-panel-header h2 {
            font-size: 0.82rem;
            font-weight: normal;
            color: var(--accent-light);
            letter-spacing: 0.04em;
            font-family: monospace;
        }
        .input-panel-header .badge {
            margin-left: auto;
            font-size: 0.65rem;
            color: var(--muted);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }
        .input-panel textarea {
            width: 100%;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 16px 18px;
            font-family: 'Georgia', serif;
            font-size: 0.92rem;
            line-height: 1.75;
            resize: vertical;
            min-height: 130px;
        }
        .input-panel textarea:focus { outline: none; }
        .input-panel textarea::placeholder { color: var(--muted); font-style: italic; }

        /* URL row */
        .url-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .url-row input[type="url"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.78rem;
        }
        .url-row input[type="url"]:focus { outline: none; border-color: var(--accent); }
        .url-row input[type="url"]::placeholder { color: var(--muted); }

        .url-status {
            font-size: 0.68rem;
            font-family: monospace;
            white-space: nowrap;
            min-width: 56px;
            text-align: right;
            flex-shrink: 0;
        }
        .url-status.fetching { color: var(--accent-light); }
        .url-status.ok { color: var(--success); }
        .url-status.warn { color: #d4950a; }
        .url-status.err { color: var(--danger); }

        /* Stage log */
        .stage-log {
            display: none;
            background: #0e0e1e;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-family: monospace;
            font-size: 0.72rem;
        }
        .stage-log.visible { display: block; }
        .stage-entry {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 3px 0;
            color: var(--muted);
        }
        .stage-entry.ok { color: var(--success); }
        .stage-entry.warn { color: #d4950a; }
        .stage-entry.err { color: var(--danger); }
        .stage-entry.active { color: var(--accent-light); }

        /* Actions */
        .actions { display: flex; gap: 12px; align-items: center; margin-bottom: 32px; }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent-light); }
        .btn-primary:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 11px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

        .status { font-size: 0.78rem; color: var(--muted); font-family: monospace; margin-left: auto; }

        /* Error banner */
        .error-banner {
            background: #2a0d0d;
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #e07070;
            font-family: monospace;
            margin-bottom: 16px;
            display: none;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results { display: none; }
        .results.visible { display: block; }

        /* Video idea cards */
        .ideas-list { display: flex; flex-direction: column; gap: 14px; }

        .idea-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 22px;
            transition: border-color 0.2s;
        }
        .idea-card:hover { border-color: var(--accent); }

        .idea-number {
            font-size: 0.65rem;
            font-family: monospace;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .idea-title {
            font-size: 1.05rem;
            color: var(--gold);
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .idea-hook {
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.65;
            font-style: italic;
            opacity: 0.85;
        }

        /* Reply output */
        .reply-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .reply-panel-header {
            background: #16162e;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .reply-panel-header h2 {
            font-size: 0.82rem;
            font-family: monospace;
            color: var(--gold);
            letter-spacing: 0.04em;
        }
        .reply-context-tag {
            font-size: 0.65rem;
            font-family: monospace;
            color: var(--success);
            background: #0d1f0d;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }
        .reply-text {
            padding: 22px 24px;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.72rem;
            font-family: monospace;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--text); }
        .copy-btn.copied { border-color: var(--success); color: var(--success); }

        /* Raw fallback */
        .raw-output {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px 24px;
            font-size: 0.9rem;
            line-height: 1.75;
            white-space: pre-wrap;
            color: var(--text);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: monospace;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Creator Tool</h1>
        <div class="subtitle">LoreBySpec — video ideas &amp; comment replies</div>
    </div>
    <a href="index.html">&#8592; portfolio</a>
</header>

<main>
    <div class="api-bar">
        <label>ANTHROPIC API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <span class="api-hint">session only &middot; never stored</span>
    </div>

    <div class="mode-toggle">
        <button class="mode-btn active" id="btnVideoIdeas" onclick="setMode('videoIdeas')">Video Ideas</button>
        <button class="mode-btn" id="btnCommentReply" onclick="setMode('commentReply')">Comment Reply</button>
    </div>

    <!-- Video Ideas UI -->
    <div id="videoIdeasUI">
        <div class="input-panel">
            <div class="input-panel-header">
                <span class="icon">&#10022;</span>
                <h2>topic or theme</h2>
            </div>
            <textarea id="topicInput" placeholder="e.g. Ventus and Roxas — their connection, what it means for Sora's identity, and why the fandom keeps getting it wrong…" rows="6"></textarea>
        </div>
    </div>

    <!-- Comment Reply UI -->
    <div id="commentReplyUI" style="display:none;">
        <div class="input-panel">
            <div class="input-panel-header">
                <span class="icon">&#9654;</span>
                <h2>youtube video url</h2>
                <span class="badge">optional — adds context</span>
            </div>
            <div class="url-row">
                <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
                <span class="url-status" id="videoUrlStatus"></span>
            </div>
        </div>
        <div class="input-panel">
            <div class="input-panel-header">
                <span class="icon">&#10022;</span>
                <h2>viewer comment</h2>
            </div>
            <textarea id="commentInput" placeholder="Paste the viewer comment here…" rows="6"></textarea>
        </div>
    </div>

    <div class="stage-log" id="stageLog"></div>
    <div class="error-banner" id="errorBanner"></div>

    <div class="actions">
        <button class="btn-primary" id="submitBtn" onclick="submit()">Generate Ideas</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusText"></span>
    </div>

    <div class="results" id="results"></div>
</main>

<footer>
    built for LoreBySpec &middot; powered by Claude Haiku 4.5 &middot; no data stored
</footer>

<script>
    let currentMode = 'videoIdeas';
    let lastReplyText = '';

    // ── Mode switching ──────────────────────────────────────────────────────

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('videoIdeasUI').style.display = mode === 'videoIdeas' ? '' : 'none';
        document.getElementById('commentReplyUI').style.display = mode === 'commentReply' ? '' : 'none';
        document.getElementById('btnVideoIdeas').classList.toggle('active', mode === 'videoIdeas');
        document.getElementById('btnCommentReply').classList.toggle('active', mode === 'commentReply');
        document.getElementById('submitBtn').textContent = mode === 'videoIdeas' ? 'Generate Ideas' : 'Draft Reply';
        clearResults();
    }

    function clearResults() {
        const results = document.getElementById('results');
        results.innerHTML = '';
        results.classList.remove('visible');
        document.getElementById('errorBanner').style.display = 'none';
        document.getElementById('statusText').textContent = '';
        resetStageLog();
        resetUrlStatus();
    }

    function clearAll() {
        document.getElementById('topicInput').value = '';
        document.getElementById('commentInput').value = '';
        document.getElementById('videoUrl').value = '';
        clearResults();
    }

    // ── Stage log ───────────────────────────────────────────────────────────

    function resetStageLog() {
        const log = document.getElementById('stageLog');
        log.innerHTML = '';
        log.classList.remove('visible');
    }

    function addStage(id, label, state = 'active') {
        const log = document.getElementById('stageLog');
        log.classList.add('visible');
        const existing = document.getElementById(`stage-${id}`);
        if (existing) {
            existing.className = `stage-entry ${state}`;
            existing.querySelector('.stage-label').textContent = label;
            return;
        }
        const entry = document.createElement('div');
        entry.className = `stage-entry ${state}`;
        entry.id = `stage-${id}`;
        entry.innerHTML = `<span class="stage-label">${escapeHtml(label)}</span>`;
        log.appendChild(entry);
    }

    function updateStage(id, label, state) {
        const entry = document.getElementById(`stage-${id}`);
        if (!entry) return;
        entry.className = `stage-entry ${state}`;
        entry.querySelector('.stage-label').textContent = label;
    }

    // ── URL status ──────────────────────────────────────────────────────────

    function setUrlStatus(el, text, state) {
        el.textContent = text;
        el.className = `url-status ${state}`;
    }

    function resetUrlStatus() {
        const el = document.getElementById('videoUrlStatus');
        if (el) { el.textContent = ''; el.className = 'url-status'; }
    }

    // ── Error display ────────────────────────────────────────────────────────

    function showError(msg) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = msg;
        banner.style.display = 'block';
    }

    function setStatus(html) {
        document.getElementById('statusText').innerHTML = html;
    }

    // ── YouTube helpers ──────────────────────────────────────────────────────

    function parseYouTubeUrl(raw) {
        try {
            const u = new URL(raw.trim());
            if (u.hostname === 'youtu.be') {
                const id = u.pathname.slice(1).split('?')[0];
                if (id) return { valid: true, canonical: `https://www.youtube.com/watch?v=${id}` };
            }
            if (u.hostname === 'www.youtube.com' || u.hostname === 'youtube.com') {
                const v = u.searchParams.get('v');
                if (u.pathname === '/watch' && v) return { valid: true, canonical: raw.trim() };
                if (u.pathname.startsWith('/shorts/')) {
                    const id = u.pathname.split('/')[2];
                    if (id) return { valid: true, canonical: `https://www.youtube.com/watch?v=${id}` };
                }
            }
        } catch {}
        return { valid: false };
    }

    async function fetchOEmbed(canonicalUrl) {
        const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(canonicalUrl)}&format=json`;
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error(`YouTube oEmbed returned HTTP ${res.status}`);
        const data = await res.json();
        if (!data.title) throw new Error('oEmbed response missing title');
        return data;
    }

    async function fetchJinaContent(canonicalUrl) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 9000);
        try {
            const res = await fetch(`https://r.jina.ai/${canonicalUrl}`, {
                headers: { 'Accept': 'text/plain' },
                signal: controller.signal
            });
            if (!res.ok) throw new Error(`Jina returned HTTP ${res.status}`);
            return (await res.text()).slice(0, 2500);
        } finally {
            clearTimeout(timer);
        }
    }

    async function buildVideoContext(rawUrl) {
        const statusEl = document.getElementById('videoUrlStatus');
        const parsed = parseYouTubeUrl(rawUrl);

        if (!parsed.valid) {
            throw new Error('URL doesn\'t look like a YouTube link — expected youtube.com/watch?v=... or youtu.be/...');
        }

        // Stage: fetch title via oEmbed
        setUrlStatus(statusEl, 'fetching…', 'fetching');
        addStage('oembed', '→ fetching video title via oEmbed…', 'active');

        let title = null;
        let description = null;

        try {
            const oembed = await fetchOEmbed(parsed.canonical);
            title = oembed.title;
            const displayTitle = title.length > 48 ? title.slice(0, 48) + '…' : title;
            setUrlStatus(statusEl, `✓ ${displayTitle}`, 'ok');
            updateStage('oembed', `✓ title: "${displayTitle}"`, 'ok');
        } catch (err) {
            setUrlStatus(statusEl, '✗ title unavailable', 'warn');
            updateStage('oembed', `✗ oEmbed failed: ${err.message} — continuing without video context`, 'warn');
            return null;
        }

        // Stage: fetch description via Jina (non-fatal)
        addStage('jina', '→ fetching video description…', 'active');
        try {
            description = await fetchJinaContent(parsed.canonical);
            updateStage('jina', '✓ description fetched', 'ok');
        } catch (err) {
            updateStage('jina', `✗ description unavailable (${err.message.includes('abort') ? 'timed out' : err.message}) — using title only`, 'warn');
        }

        let context = `Video title: "${title}"`;
        if (description) context += `\n\nVideo page content (excerpt):\n${description}`;
        return context;
    }

    // ── API call ─────────────────────────────────────────────────────────────

    async function callApi(body) {
        const apiKey = document.getElementById('apiKey').value.replace(/[^\x20-\x7E]/g, '').trim();

        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true',
                'content-type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        if (!res.ok) {
            let msg = `HTTP ${res.status}`;
            try {
                const err = await res.json();
                if (err.error?.message) msg = err.error.message;
            } catch {}
            if (res.status === 401) throw new Error('API key rejected — check that it\'s correct and hasn\'t been revoked.');
            if (res.status === 429) throw new Error('Rate limit reached — wait a moment and try again.');
            if (res.status === 403) throw new Error('Access denied — check your API key permissions.');
            throw new Error(`API error: ${msg}`);
        }

        return res.json();
    }

    // ── Main submit ──────────────────────────────────────────────────────────

    async function submit() {
        const apiKey = document.getElementById('apiKey').value.replace(/[^\x20-\x7E]/g, '').trim();
        const submitBtn = document.getElementById('submitBtn');

        document.getElementById('errorBanner').style.display = 'none';
        resetStageLog();
        resetUrlStatus();

        // Stage 1: validate API key
        if (!apiKey) return showError('Enter your Anthropic API key above.');
        if (!apiKey.startsWith('sk-ant-')) return showError('API key looks wrong — should start with sk-ant-. Clear the field and re-paste.');

        submitBtn.disabled = true;
        document.getElementById('results').innerHTML = '';
        document.getElementById('results').classList.remove('visible');

        try {
            if (currentMode === 'videoIdeas') {
                await runVideoIdeas(apiKey);
            } else {
                await runCommentReply(apiKey);
            }
        } catch (err) {
            showError(err.message);
            setStatus('');
        } finally {
            submitBtn.disabled = false;
        }
    }

    // ── Video Ideas ──────────────────────────────────────────────────────────

    const IDEAS_TOOL = {
        name: 'generate_video_ideas',
        description: 'Generate exactly 5 Kingdom Hearts YouTube video angle ideas for LoreBySpec',
        input_schema: {
            type: 'object',
            properties: {
                ideas: {
                    type: 'array',
                    description: 'Exactly 5 video ideas',
                    minItems: 5,
                    maxItems: 5,
                    items: {
                        type: 'object',
                        properties: {
                            title: {
                                type: 'string',
                                description: 'YouTube video title — compelling and specific, 6–12 words, not clickbait'
                            },
                            hook: {
                                type: 'string',
                                description: 'One sentence: the unique angle, the insight it surfaces, or why a KH lore audience would click'
                            }
                        },
                        required: ['title', 'hook']
                    }
                }
            },
            required: ['ideas']
        }
    };

    async function runVideoIdeas(apiKey) {
        const topic = document.getElementById('topicInput').value.trim();
        if (!topic) throw new Error('Paste a topic or theme to generate ideas for.');

        // Stage: API call
        addStage('api', '→ generating ideas…', 'active');
        setStatus('<span class="spinner"></span> generating…');

        const data = await callApi({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 800,
            tools: [IDEAS_TOOL],
            tool_choice: { type: 'tool', name: 'generate_video_ideas' },
            system: 'You are a content strategist for LoreBySpec, a Kingdom Hearts theory and analysis YouTube channel. The audience is lore-literate and hungry for angles they haven\'t considered — not recaps, not surface-level takes. Generate ideas that go deeper: implications, contradictions, underexplored connections, revisionist readings.',
            messages: [{ role: 'user', content: topic }]
        });

        // Stage: parse response
        addStage('parse', '→ parsing response…', 'active');

        if (!data.content || !Array.isArray(data.content)) {
            throw new Error('Response structure error: missing content array. Try again.');
        }

        const toolBlock = data.content.find(b => b.type === 'tool_use' && b.name === 'generate_video_ideas');
        if (!toolBlock) {
            const stopReason = data.stop_reason || 'unknown';
            throw new Error(`Response structure error: expected tool_use block, got stop_reason="${stopReason}". Try again.`);
        }

        if (!toolBlock.input || !Array.isArray(toolBlock.input.ideas)) {
            throw new Error('Response structure error: tool block missing ideas array. Try again.');
        }

        const raw = toolBlock.input.ideas;
        if (raw.length === 0) {
            throw new Error('No ideas were returned — try rephrasing the topic.');
        }

        // Validate each idea
        const ideas = raw.map((idea, i) => {
            const n = i + 1;
            if (typeof idea.title !== 'string' || !idea.title.trim()) {
                throw new Error(`Idea ${n} is missing a title — try again.`);
            }
            if (typeof idea.hook !== 'string' || !idea.hook.trim()) {
                throw new Error(`Idea ${n} is missing a hook — try again.`);
            }
            return { title: idea.title.trim(), hook: idea.hook.trim() };
        });

        updateStage('api', `✓ ${ideas.length} ideas generated`, 'ok');
        updateStage('parse', '✓ parsed cleanly', 'ok');

        document.getElementById('results').innerHTML = renderIdeas(ideas);
        document.getElementById('results').classList.add('visible');
        setStatus(`done · ${ideas.length} ideas · claude haiku 4.5`);
    }

    // ── Comment Reply ────────────────────────────────────────────────────────

    async function runCommentReply(apiKey) {
        const comment = document.getElementById('commentInput').value.trim();
        const rawUrl = document.getElementById('videoUrl').value.trim();

        if (!comment) throw new Error('Paste a viewer comment to reply to.');

        let videoContext = null;

        if (rawUrl) {
            videoContext = await buildVideoContext(rawUrl);
            // buildVideoContext throws on invalid URL format; null means fetches failed gracefully
        }

        // Stage: API call
        addStage('api', '→ drafting reply…', 'active');
        setStatus('<span class="spinner"></span> drafting…');

        const systemPrompt = videoContext
            ? `You are LoreBySpec, a Kingdom Hearts YouTube creator known for warm, thorough lore analysis. You are replying to a viewer comment on a specific video.

${videoContext}

Write a reply that is:
- Genuine and warm — like talking to a fellow fan who cares about the lore
- Grounded in the video's content — reference what the video covered when it's relevant
- Knowledgeable — bring in specific lore details, games, or moments where they add value
- Concise: 2–4 sentences
- Never sycophantic — do not open with "great question", "love this", "so glad you asked", or any variation
- Written in first person as yourself (LoreBySpec)

Respond with only the reply text. No labels, no quotation marks, no meta-commentary.`
            : `You are LoreBySpec, a Kingdom Hearts YouTube creator known for warm, thorough lore analysis. You are drafting a reply to a viewer comment.

Write a reply that is:
- Genuine and warm — like talking to a fellow fan who cares about the lore
- Knowledgeable — bring in specific lore details, games, or moments where they add value
- Concise: 2–4 sentences
- Never sycophantic — do not open with "great question", "love this", "so glad you asked", or any variation
- Written in first person as yourself (LoreBySpec)

Respond with only the reply text. No labels, no quotation marks, no meta-commentary.`;

        const data = await callApi({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 300,
            system: systemPrompt,
            messages: [{ role: 'user', content: comment }]
        });

        // Validate response
        if (!data.content || !Array.isArray(data.content) || data.content.length === 0) {
            throw new Error('Response structure error: missing content. Try again.');
        }
        const block = data.content[0];
        if (block.type !== 'text') {
            throw new Error(`Response structure error: expected text block, got "${block.type}". Try again.`);
        }
        const replyText = (block.text || '').trim();
        if (!replyText) {
            throw new Error('API returned an empty reply — try again.');
        }

        updateStage('api', '✓ reply drafted', 'ok');

        document.getElementById('results').innerHTML = renderReply(replyText, !!videoContext);
        document.getElementById('results').classList.add('visible');
        setStatus('done · claude haiku 4.5');
    }

    // ── Renderers ────────────────────────────────────────────────────────────

    function renderIdeas(ideas) {
        return `<div class="ideas-list">${ideas.map((idea, i) => `
            <div class="idea-card">
                <div class="idea-number">idea ${i + 1} of ${ideas.length}</div>
                <div class="idea-title">${escapeHtml(idea.title)}</div>
                <div class="idea-hook">${escapeHtml(idea.hook)}</div>
            </div>`).join('')}</div>`;
    }

    function renderReply(text, hasVideoContext) {
        lastReplyText = text;
        const contextTag = hasVideoContext
            ? '<span class="reply-context-tag">video context used</span>'
            : '';
        return `<div class="reply-panel">
            <div class="reply-panel-header">
                <div style="display:flex;align-items:center;gap:0;"">
                    <h2>drafted reply</h2>${contextTag}
                </div>
                <button class="copy-btn" id="copyBtn" onclick="copyReply()">copy</button>
            </div>
            <div class="reply-text">${escapeHtml(lastReplyText)}</div>
        </div>`;
    }

    function copyReply() {
        navigator.clipboard.writeText(lastReplyText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = 'copied ✓';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
        });
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>
